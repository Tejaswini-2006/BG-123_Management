<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeAdmin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>

<body class="font-sans antialiased bg-gray-50 text-gray-800">

<div class="fixed inset-0 z-[100] flex">
    
    <!-- Left Panel -->
    <div class="hidden lg:flex lg:w-1/2 bg-gray-900 flex-col items-center justify-center p-12 text-white">
        <div class="text-center max-w-md">
            <h1 class="text-3xl font-bold mb-4">ForgeAdmin</h1>
            <p class="text-gray-400">Powerful admin dashboard for your e-commerce.</p>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-md">

            <h2 class="text-3xl font-bold mb-2">Welcome back</h2>
            <p class="text-gray-500 mb-6">Sign in to your admin dashboard</p>

            <!-- FORM -->
            <form class="space-y-5">

                <div>
                    <label>Email</label>
                    <input id="email" type="text" value="admin@forgecart.com" class="forge-input w-full p-2 border rounded">
                </div>

                <div>
                    <label>Password</label>
                    <input id="password" type="password" value="password123" class="forge-input w-full p-2 border rounded">
                </div>

                <button type="submit" class="bg-orange-500 text-white w-full p-2 rounded">
                    Sign In
                </button>

            </form>

        </div>
    </div>

</div>

<!-- FIREBASE LOGIN SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCENmDR7KuVvKgQpsDUcoDq0BRglisMqJs",
  authDomain: "management-7576c.firebaseapp.com",
  projectId: "management-7576c",
  storageBucket: "management-7576c.firebasestorage.app",
  messagingSenderId: "1054683564424",
  appId: "1:1054683564424:web:4f7f1e7fb568b5d2ca123d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.querySelector("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login successful ✅");

    window.location.href = "dashboard.html";

  } catch (error) {
    alert("Login failed ❌ " + error.message);
  }
});
</script>

</body>
</html>
